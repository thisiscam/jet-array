name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        jax-version: ["0.8.3", "0.9.2", "0.10.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install --force-reinstall --no-deps "jax==${{ matrix.jax-version }}" "jaxlib==${{ matrix.jax-version }}"
      - name: Run tests
        run: pytest -v
